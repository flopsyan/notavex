services:
  notavex:
    build: .
    # Prefer a prebuilt image? Comment out "build" above and use:
    # image: ghcr.io/flopsyan/notavex:latest
    container_name: notavex
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NOTAVEX_ADDR: ":8080"
      # Uncomment to require a login (recommended if reachable from the internet):
      # NOTAVEX_PASSWORD: "change-me-please"
      # Set to "true" if a reverse proxy terminates HTTPS in front of Notavex:
      # NOTAVEX_SECURE: "true"
    volumes:
      - notavex-data:/data

volumes:
  notavex-data:
