services:
  jot:
    build: .
    # Prefer a prebuilt image? Comment out "build" above and use:
    # image: ghcr.io/flopsyan/jot:latest
    container_name: jot
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JOT_ADDR: ":8080"
      # Uncomment to require a login (recommended if reachable from the internet):
      # JOT_PASSWORD: "change-me-please"
      # Set to "true" if a reverse proxy terminates HTTPS in front of Jot:
      # JOT_SECURE: "true"
    volumes:
      - jot-data:/data

volumes:
  jot-data:
