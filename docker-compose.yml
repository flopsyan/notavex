services:
  notavex:
    build: .
    # Prefer a prebuilt image? Comment out "build" above and use:
    # image: ghcr.io/flopsyan/notavex:latest
    container_name: notavex
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NOTAVEX_ADDR: ":8080"
      # Uncomment to require a login (recommended if reachable from the internet).
      # On first start these create the admin account; manage further users in the
      # app under Settings. Afterwards they are ignored.
      # NOTAVEX_USER: "admin"
      # NOTAVEX_PASSWORD: "change-me-please"
      # Set to "true" if a reverse proxy terminates HTTPS in front of Notavex:
      # NOTAVEX_SECURE: "true"
    volumes:
      # Default: a named Docker volume.
      - notavex-data:/data
      # To keep the data on a NAS instead, comment the line above and bind-mount
      # a path from the NAS (adjust to your NAS, e.g. Synology /volume1/...):
      # - /volume1/docker/notavex:/data

volumes:
  notavex-data:
