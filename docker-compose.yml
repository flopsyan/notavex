name: notavex

services:
  notavex:
    build: .
    image: notavex:latest
    # Prefer a prebuilt image? Comment out "build" above and use:
    # image: ghcr.io/flopsyan/notavex:latest
    container_name: notavex
    restart: unless-stopped
    ports:
      # Host port is configurable via .env (NOTAVEX_PORT), default 8080.
      - "${NOTAVEX_PORT:-8080}:8080"
    environment:
      NOTAVEX_ADDR: ":8080"
      # Login: leave NOTAVEX_PASSWORD empty to run WITHOUT a login. Set it (in
      # .env) to bootstrap the admin account "NOTAVEX_USER" on the FIRST start;
      # afterwards users are managed in the app under Settings and the value is
      # ignored. Once an account exists a login is required.
      NOTAVEX_USER: ${NOTAVEX_USER:-admin}
      NOTAVEX_PASSWORD: ${NOTAVEX_PASSWORD:-}
      # Set to "true" if a reverse proxy terminates HTTPS in front of Notavex:
      NOTAVEX_SECURE: ${NOTAVEX_SECURE:-false}
      # Optional fixed session signing secret (random + persisted if empty):
      NOTAVEX_SECRET: ${NOTAVEX_SECRET:-}
    volumes:
      # Default: a named Docker volume.
      - notavex-data:/data
      # To keep the data on a NAS instead, comment the line above and bind-mount
      # a path from the NAS (adjust to your NAS, e.g. Synology /volume1/...):
      # - /volume1/docker/notavex:/data

volumes:
  notavex-data:
