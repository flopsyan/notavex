<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Jot · Sign in</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
  <form id="login-form" class="login-card">
    <div class="brand"><span class="logo">📝</span> Jot</div>
    <p class="login-sub">Enter your password to continue.</p>
    <input id="password" type="password" placeholder="Password" autocomplete="current-password" autofocus required>
    <button type="submit">Sign in</button>
    <p id="login-error" class="login-error" hidden></p>
  </form>
  <script src="/static/login.js"></script>
</body>
</html>
