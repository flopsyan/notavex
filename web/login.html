<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Notavex · Sign in</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235f6368' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'><path d='M5 4h11l3 3v13H5z'/><path d='M9 12l2 2 4-4'/></svg>">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
  <form id="login-form" class="login-card">
    <div class="brand"><span class="logo"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h11l3 3v13H5z"/><path d="M9 12l2 2 4-4"/></svg></span> Notavex</div>
    <p class="login-sub">Enter your password to continue.</p>
    <input id="password" type="password" placeholder="Password" autocomplete="current-password" autofocus required>
    <button type="submit">Sign in</button>
    <p id="login-error" class="login-error" hidden></p>
  </form>
  <script src="/static/login.js"></script>
</body>
</html>
