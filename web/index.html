<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Notavex</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235f6368' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'><path d='M5 4h11l3 3v13H5z'/><path d='M9 12l2 2 4-4'/></svg>">
  <script src="/static/boot.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <button id="nav-toggle" class="icon-btn" data-i18n-aria="menu_toggle" aria-label="Toggle menu"></button>
    <div class="brand"><span id="brand-logo" class="logo"></span> <span class="brand-name">Notavex</span></div>
    <div class="search">
      <input id="search" type="search" data-i18n-ph="search_ph" placeholder="Search your notes" autocomplete="off" spellcheck="false">
    </div>
    <div class="topbar-actions">
      <div id="account" class="account">
        <button id="account-btn" class="icon-btn" aria-haspopup="true" aria-expanded="false" data-i18n-aria="account_menu" aria-label="Account"></button>
        <div id="account-menu" class="account-menu" role="menu" hidden>
          <div id="account-card" class="account-card" hidden>
            <span id="account-card-name" class="account-card-name"></span>
            <span id="account-card-sub" class="account-card-sub"></span>
          </div>
          <button type="button" id="account-profile" class="account-item" role="menuitem">
            <span class="account-ico"></span><span data-i18n="menu_account">Account</span>
          </button>
          <button type="button" id="account-settings" class="account-item" role="menuitem">
            <span class="account-ico"></span><span data-i18n="menu_settings">Settings</span>
          </button>
          <button type="button" id="account-logout" class="account-item" role="menuitem" hidden>
            <span class="account-ico"></span><span data-i18n="logout">Log out</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-inner">
        <nav id="nav-views" class="nav-views"></nav>
        <div class="nav-section" data-i18n="nav_labels">Labels</div>
        <div id="label-list" class="label-list"></div>
      </div>
    </aside>

    <main class="main">
      <form id="composer" class="composer collapsed" autocomplete="off">
        <div class="composer-collapsed-bar">
          <input id="composer-collapsed" class="composer-collapsed" data-i18n-ph="composer_take_note" placeholder="Take a note…" readonly>
          <button type="button" id="composer-newlist" class="icon-btn" data-i18n-title="composer_new_list" title="New list" aria-label="New list"></button>
          <button type="button" id="composer-newnumlist" class="icon-btn" data-i18n-title="composer_new_numlist" title="New numbered list" aria-label="New numbered list"></button>
          <button type="button" id="composer-image-collapsed" class="icon-btn" data-i18n-title="image_add" title="Add image" aria-label="Add image"></button>
        </div>
        <div class="composer-expanded">
          <div id="composer-images" class="note-images-edit" hidden></div>
          <input id="composer-title" class="composer-title" data-i18n-ph="composer_title" placeholder="Title" maxlength="1024">
          <textarea id="editor" rows="3" data-i18n-ph="composer_note" placeholder="Take a note…  (Markdown &amp; tables supported)"></textarea>
          <div id="composer-checklist" class="note-checklist composer-checklist" hidden></div>
          <div id="composer-chips" class="composer-chips" hidden></div>
          <div id="composer-preview" class="preview markdown" hidden></div>
          <div class="composer-toolbar">
            <div id="composer-colors" class="color-dots"></div>
            <button type="button" id="composer-label-btn" class="icon-btn" data-i18n-title="add_label" title="Add label" aria-label="Add label"></button>
            <button type="button" id="composer-list-btn" class="icon-btn" data-i18n-title="checklist" title="Checklist" aria-label="Toggle checklist"></button>
            <button type="button" id="composer-image-btn" class="icon-btn" data-i18n-title="image_add" title="Add image" aria-label="Add image"></button>
            <button type="button" id="composer-preview-btn" class="ghost" data-i18n="preview">Preview</button>
            <span class="spacer"></span>
            <button type="button" id="composer-close" class="text-btn" data-i18n="close">Close</button>
          </div>
        </div>
        <input type="file" id="composer-image-file" accept="image/*" multiple hidden>
      </form>

      <div id="board-actions" class="board-actions" hidden></div>

      <section id="pinned-section" class="grid-section" hidden>
        <h2 class="section-label" data-i18n="section_pinned">Pinned</h2>
        <div id="pinned-grid" class="masonry"></div>
      </section>

      <section id="others-section" class="grid-section">
        <h2 id="others-label" class="section-label" data-i18n="section_others" hidden>Others</h2>
        <div id="others-grid" class="masonry"></div>
      </section>

      <p id="empty" class="empty" hidden></p>
    </main>
  </div>

  <div id="scrim" class="scrim"></div>
  <script src="/static/app.js"></script>
</body>
</html>
